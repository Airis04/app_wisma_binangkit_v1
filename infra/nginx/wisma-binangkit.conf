# Contoh konfigurasi Nginx production untuk Wisma Binangkit.
# Ganti server_name, path SSL, dan port upstream sesuai server deployment.

upstream wisma_binangkit_next {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name wisma-binangkit.example.com;

    # Jika sudah memakai SSL, aktifkan redirect ke HTTPS.
    # return 301 https://$host$request_uri;

    client_max_body_size 10M;

    location / {
        proxy_pass http://wisma_binangkit_next;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Dibutuhkan oleh Next.js dev/prod untuk koneksi upgrade jika nanti dipakai.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

